services:
  # 1. Backend Service
  - type: web
    name: myshop-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js  # Apne main server file ka naam likhein
    envVars:
      - key: MONGODB_URI
        value: your_mongodb_atlas_connection_string # Yahan apna Atlas URL dalein
      - key: NODE_ENV
        value: production

  # 2. Frontend Service (Static Site)
  - type: static
    name: myshop-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: ./dist # Agar Vite use kar rahe hain toh 'dist', Create React App hai toh 'build'